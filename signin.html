<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Kings Clothing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell auth-shell">
    <header class="site-header">
      <div class="brand">KINGS CLOTHING</div>
      <nav class="menu">
        <a href="index.html">Shop</a>
        <a href="signup.html">Sign Up</a>
        <a href="agent.html">Agent</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <h1>Sign In</h1>
        <p>Access your agent dashboard, order history, and checkout flow.</p>
        <form>
          <label for="signinEmail">Email</label>
          <input id="signinEmail" type="email" placeholder="you@kingsclothinggh.com" required />
          <label for="signinPassword">Password</label>
          <input id="signinPassword" type="password" placeholder="••••••••" required />
          <button class="btn btn-primary" type="submit">Sign In</button>
        </form>
        <p class="auth-switch">New here? <a href="signup.html">Create an account</a></p>
      </section>
    </main>
  </div>
</body>
</html>
